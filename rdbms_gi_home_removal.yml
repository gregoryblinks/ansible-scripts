---
- name: Remove old Oracle home safely
  hosts: all
  become: true
  gather_facts: false

  vars_prompt:
    - name: dbhome_name
      prompt: "Enter DB home name (e.g. dbhome_1) or leave blank"
      private: no
      default: ""

    - name: db_version
      prompt: "Enter DB version (e.g. 19.26.0.0_250121) or leave blank"
      private: no
      default: ""

    - name: gi_version
      prompt: "Enter GI version (e.g. 19.26.0.0) or leave blank"
      private: no
      default: ""

  vars:
    homes_to_process: >-
      {{
        []
        + ([ "/u01/app/oracle/product/" ~ db_version ~ "/" ~ dbhome_name ]
           if dbhome_name|length > 0 and db_version|length > 0 else [])
        + ([ "/u01/app/" ~ gi_version ~ "/grid" ]
           if gi_version|length > 0 else [])
      }}

  tasks:

    - name: Loop through homes and execute original logic
      block:

        - name: Set current home
          set_fact:
            old_home: "{{ item }}"

    # -----------------------------------
    # Validate input
    # -----------------------------------
    - name: Ensure old_home was provided
      assert:
        that:
          - old_home | length > 0
        fail_msg: "You must enter a valid Oracle Home path"
 
    - name: Prevent unsafe or malformed paths
      assert:
        that:
          - old_home.startswith('/u01/app/')
          - old_home | length > 10
        fail_msg: "Unsafe or invalid Oracle Home path!"
 
    # -----------------------------------
    # Check path exists
    # -----------------------------------
    - name: Check old_home exists
      stat:
        path: "{{ old_home }}"
      register: old_home_stat
 
    - name: Fail if old_home does not exist
      fail:
        msg: "old_home {{ old_home }} does not exist"
      when: not old_home_stat.stat.exists
 
    # -----------------------------------
    # Detect if GI or DB home
    # -----------------------------------
    - name: Detect GI marker (crsctl)
      stat:
        path: "{{ old_home }}/bin/crsctl"
      register: crsctl_stat
 
    - name: Set home type and execution user
      set_fact:
        home_type: "{{ 'GI' if crsctl_stat.stat.exists else 'RDBMS' }}"
        exec_user: "{{ 'grid' if crsctl_stat.stat.exists else 'oracle' }}"
 
    - name: Show detected home details
      debug:
        msg:
          - "Home: {{ old_home }}"
          - "Type: {{ home_type }}"
          - "Run as: {{ exec_user }}"
 
    # -----------------------------------
    # PRECHECK: Running processes
    # -----------------------------------
    - name: Check if home is in use (process check)
      shell: |
        ps -ef | grep -F "{{ old_home }}" | grep -v grep || true
      register: home_usage
      changed_when: false
 
    - name: Fail if home is in use
      fail:
        msg: "Oracle Home is currently in use! Stop DB/CRS before removal."
      when: home_usage.stdout | length > 0
 
    # -----------------------------------
    # PRECHECK: CRS resource dependency (only for GI)
    # -----------------------------------
    - name: Check CRS resources using this home
      become_user: grid
      shell: |
        crsctl stat res -p | grep -i "{{ old_home }}" || true
      register: crs_usage
      changed_when: false
      when: home_type == "GI"
 
    - name: Fail if CRS resources depend on this home
      fail:
        msg: "CRS resources are still using this home! Clean up CRS before removal."
      when:
        - home_type == "GI"
        - crs_usage.stdout | length > 0
 
    # -----------------------------------
    # DETACH HOME
    # -----------------------------------
    - name: Detach old home from inventory
      become_user: "{{ exec_user }}"
      command: >
        {{ old_home }}/oui/bin/runInstaller
        -detachHome
        -silent
        -local
        ORACLE_HOME={{ old_home }}
      register: detach_result
 
    - name: Ensure detach succeeded
      assert:
        that:
          - detach_result.rc == 0
        fail_msg: "Detach home failed!"
 
    - name: Show detach output
      debug:
        var: detach_result.stdout_lines
 
    # -----------------------------------
    # VERIFY inventory.xml cleanup
    # -----------------------------------
    - name: Get inventory location
      shell: |
        grep inventory_loc /etc/oraInst.loc | cut -d= -f2
      register: inventory_loc
      changed_when: false
 
    - name: Check inventory.xml for this home
      shell: |
        grep -i "{{ old_home }}" {{ inventory_loc.stdout }}/ContentsXML/inventory.xml || true
      register: inventory_check
 
    - name: Assert home is marked REMOVED
      assert:
        that:
          - "'REMOVED=\"T\"' in inventory_check.stdout"
        fail_msg: "Home NOT properly detached in inventory!"
        success_msg: "Home successfully marked as REMOVED"
 
    # -----------------------------------
    # REMOVE DIRECTORY
    # -----------------------------------
    - name: Remove old home directory
      file:
        path: "{{ old_home }}"
        state: absent
 
    # -----------------------------------
    # REMOVE PARENT DIRECTORY IF EMPTY
    # -----------------------------------
    - name: Check if parent directory is empty
      shell: |
        ls -A {{ old_home | dirname }} || true
      register: parent_contents
      changed_when: false
 
    - name: Remove parent directory if empty
      file:
        path: "{{ old_home | dirname }}"
        state: absent
      when: parent_contents.stdout == ""
 
    # -----------------------------------
    # FINAL VALIDATION
    # -----------------------------------
    - name: Final inventory check for leftovers
      shell: |
        grep -i "{{ old_home }}" {{ inventory_loc.stdout }}/ContentsXML/inventory.xml || true
      register: final_inventory
 
    - name: Show remaining inventory entries
      debug:
        var: final_inventory.stdout
